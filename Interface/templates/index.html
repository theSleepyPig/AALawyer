<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法条检索系统</title>
    <style>
        /* 设置全局样式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
        }

        /* 容器 */
        .container {
            width: 60%;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        h2 {
            color: #333;
            text-align: center;
        }

        /* 文本框 */
        textarea {
            width: 98%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: vertical;
        }

        /* 按钮 */
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            display: block;
            width: 100%;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* 结果框 */
        .result-box {
            background: #eef;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            border-left: 5px solid #007bff;
        }

        h3 {
            color: #007bff;
        }

        pre {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Legal Case Analysis</h2>
        <form method="post">
            <textarea name="case_description" rows="6" placeholder="Please type the description of the case">{{ case }}</textarea><br>
            <button type="submit">Submit</button>
        </form>

        {% if prediction %}
        <div class="result-box">
            <h3>Related Articles:</h3>
            <pre>{{ laws }}</pre>
            <pre>{{ translated_articles }}</pre>
        </div>

        <div class="result-box">
            <h3>Case Analysis:</h3>
            <p>{{ analysis }}</p>
            <p>{{ translated_analysis }}</p>
        </div>

        {% endif %}
    </div>

</body>

</html>
